<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Git Dashboard — Emerging Tech Hub</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    background: #f5f5f5;
    color: #111;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #17181c; color: #eee; }
    .card { background: #212328 !important; border-color: #333 !important; }
    .file-row:hover { background: #2a2c33 !important; }
    textarea, select { background: #1b1c20 !important; color: #eee !important; border-color: #3a3b40 !important; }
    pre { background: #101114 !important; color: #ccc !important; }
    .btn-secondary { background: #2a2c33 !important; color: #eee !important; }
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .subtitle { font-size: 13px; opacity: 0.65; margin-bottom: 20px; }
  .card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  .status-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .badge {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    background: #eee;
  }
  .badge.ahead { background: #dff5e1; color: #1a7d33; }
  .badge.behind { background: #fde8e8; color: #b3261e; }
  .file-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 4px;
    border-radius: 6px;
    cursor: pointer;
  }
  .file-row:hover { background: #f3f3f3; }
  .file-status {
    font-family: ui-monospace, monospace;
    font-size: 12px;
    width: 24px;
    text-align: center;
    opacity: 0.7;
  }
  .file-path { font-size: 13px; flex: 1; word-break: break-all; }
  textarea {
    width: 100%;
    min-height: 60px;
    font-family: inherit;
    font-size: 14px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    resize: vertical;
  }
  select {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
  }
  .actions { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  button {
    font-size: 13px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }
  .btn-primary { background: #111; color: #fff; }
  .btn-primary:hover { background: #333; }
  @media (prefers-color-scheme: dark) { .btn-primary { background: #eee; color: #111; } .btn-primary:hover { background: #fff; } }
  .btn-secondary { background: #eee; color: #111; }
  .btn-secondary:hover { background: #e2e2e2; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  pre {
    background: #101114;
    color: #ccc;
    font-size: 12px;
    padding: 12px;
    border-radius: 8px;
    max-height: 300px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .empty { font-size: 13px; opacity: 0.6; padding: 8px 4px; }
  .section-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .link-btn { background: none; border: none; font-size: 12px; text-decoration: underline; opacity: 0.7; padding: 0; cursor: pointer; }
</style>
</head>
<body>

<h1>Git Dashboard</h1>
<div class="subtitle" id="repoBranch">Loading…</div>

<div class="card">
  <div class="status-row">
    <span id="branchBadge" class="badge">—</span>
    <span id="aheadBadge" class="badge ahead" style="display:none;"></span>
    <span id="behindBadge" class="badge behind" style="display:none;"></span>
    <button class="link-btn" onclick="refresh()">Refresh</button>
  </div>
</div>

<div class="card">
  <div class="toolbar">
    <div class="section-title">Changed files</div>
    <div>
      <button class="link-btn" onclick="toggleAll(true)">Select all</button> ·
      <button class="link-btn" onclick="toggleAll(false)">Select none</button>
    </div>
  </div>
  <div id="fileList"></div>
</div>

<div class="card">
  <div class="section-title">Commit</div>
  <textarea id="commitMessage" placeholder="Commit message…"></textarea>
  <div class="actions">
    <button class="btn-primary" onclick="doCommit(true)">Commit &amp; Push</button>
    <button class="btn-secondary" onclick="doCommit(false)">Commit only</button>
  </div>
</div>

<div class="card">
  <div class="section-title">Sync</div>
  <div class="actions">
    <button class="btn-secondary" onclick="doPull()">Pull</button>
    <button class="btn-secondary" onclick="doPush()">Push</button>
  </div>
</div>

<div class="card">
  <div class="section-title">Merge branch into current</div>
  <div class="actions" style="align-items:center;">
    <select id="branchSelect"></select>
    <button class="btn-secondary" onclick="doMerge()">Merge</button>
  </div>
</div>

<div class="card">
  <div class="section-title">Output</div>
  <pre id="log">Ready.</pre>
</div>

<script>
let selected = new Set();
let currentFiles = [];

function log(text) {
  document.getElementById('log').textContent = text;
}

async function api(path, opts) {
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

async function refresh() {
  try {
    const status = await api('/api/status');
    currentFiles = status.files;
    selected = new Set(status.files.map(f => f.path));

    document.getElementById('repoBranch').textContent = `Local git dashboard — repo tracked on branch "${status.branch}"`;
    document.getElementById('branchBadge').textContent = status.branch;

    const aheadEl = document.getElementById('aheadBadge');
    const behindEl = document.getElementById('behindBadge');
    aheadEl.style.display = status.ahead > 0 ? 'inline-block' : 'none';
    aheadEl.textContent = `${status.ahead} ahead`;
    behindEl.style.display = status.behind > 0 ? 'inline-block' : 'none';
    behindEl.textContent = `${status.behind} behind`;

    renderFiles();
    await loadBranches();
  } catch (err) {
    log('Error loading status: ' + err.message);
  }
}

function renderFiles() {
  const container = document.getElementById('fileList');
  if (currentFiles.length === 0) {
    container.innerHTML = '<div class="empty">Working tree clean — nothing to commit.</div>';
    return;
  }
  container.innerHTML = '';
  currentFiles.forEach(f => {
    const row = document.createElement('div');
    row.className = 'file-row';
    row.innerHTML = `
      <input type="checkbox" ${selected.has(f.path) ? 'checked' : ''} data-path="${encodeURIComponent(f.path)}">
      <span class="file-status">${f.status}</span>
      <span class="file-path">${f.path}</span>
    `;
    row.querySelector('input').addEventListener('change', (e) => {
      if (e.target.checked) selected.add(f.path); else selected.delete(f.path);
    });
    row.querySelector('.file-path').addEventListener('click', () => showDiff(f.path));
    container.appendChild(row);
  });
}

function toggleAll(state) {
  selected = state ? new Set(currentFiles.map(f => f.path)) : new Set();
  renderFiles();
}

async function showDiff(file) {
  try {
    const data = await api('/api/diff?file=' + encodeURIComponent(file));
    log(data.diff || '(no diff — likely a new untracked file)');
  } catch (err) {
    log('Error loading diff: ' + err.message);
  }
}

async function doCommit(push) {
  const message = document.getElementById('commitMessage').value.trim();
  if (!message) { log('Enter a commit message first.'); return; }
  if (selected.size === 0) { log('Select at least one file.'); return; }
  try {
    log(push ? 'Committing and pushing…' : 'Committing…');
    const data = await api('/api/commit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: Array.from(selected), message, push }),
    });
    log([data.commitOutput, data.pushOutput].filter(Boolean).join('\n\n') || 'Done.');
    document.getElementById('commitMessage').value = '';
    await refresh();
  } catch (err) {
    log('Error: ' + err.message);
  }
}

async function doPush() {
  try {
    log('Pushing…');
    const data = await api('/api/push', { method: 'POST' });
    log(data.output || 'Pushed.');
    await refresh();
  } catch (err) {
    log('Error: ' + err.message);
  }
}

async function doPull() {
  try {
    log('Pulling…');
    const data = await api('/api/pull', { method: 'POST' });
    log(data.output || 'Pulled.');
    await refresh();
  } catch (err) {
    log('Error: ' + err.message);
  }
}

async function loadBranches() {
  try {
    const data = await api('/api/branches');
    const select = document.getElementById('branchSelect');
    select.innerHTML = '';
    [...data.local, ...data.remote].filter(Boolean).forEach(b => {
      const opt = document.createElement('option');
      opt.value = b;
      opt.textContent = b;
      select.appendChild(opt);
    });
  } catch (err) {
    log('Error loading branches: ' + err.message);
  }
}

async function doMerge() {
  const branch = document.getElementById('branchSelect').value;
  if (!branch) return;
  if (!confirm(`Merge "${branch}" into the current branch?`)) return;
  try {
    log(`Merging ${branch}…`);
    const data = await api('/api/merge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ branch }),
    });
    log(data.output || 'Merged.');
    await refresh();
  } catch (err) {
    log('Error: ' + err.message);
  }
}

refresh();
</script>
</body>
</html>
